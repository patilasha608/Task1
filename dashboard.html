<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>MyApp</h2>
        <ul>
            <li>Dashboard</li>
            <li>Profile</li>
            <li>Settings</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </aside>

    <main class="main-content">
        <header>
            <h1>Dashboard</h1>
        </header>

        <div class="cards">
            <div class="card">
                <h3>Users</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>$4,500</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>75</p>
            </div>
        </div>
    </main>

</div>

<script src="script.js"></script>
</body>
</html>
